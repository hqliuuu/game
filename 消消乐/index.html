<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>未名档案消消乐</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <canvas id="game" aria-label="未名档案消消乐游戏画布"></canvas>

      <section id="menu" class="overlay menu">
        <div class="brand">
          <span>未名档案</span>
          <h1>消消乐</h1>
        </div>
        <button id="startBtn" class="primary">开始调查</button>
        <button id="continueBtn">继续案件</button>
      </section>

      <section id="result" class="overlay result hidden">
        <h2 id="resultTitle">调查完成</h2>
        <p id="resultText">证据链已经整理完毕。</p>
        <button id="nextBtn" class="primary">下一关</button>
        <button id="retryBtn">重新调查</button>
      </section>

      <div class="hud">
        <div>
          <span>关卡</span>
          <strong id="levelText">1</strong>
        </div>
        <div>
          <span>分数</span>
          <strong id="scoreText">0</strong>
        </div>
        <div>
          <span>步数</span>
          <strong id="movesText">24</strong>
        </div>
        <div>
          <span>目标</span>
          <strong id="targetText">4500</strong>
        </div>
      </div>

      <div class="controls">
        <button id="musicBtn" title="音乐开关">♪</button>
        <button id="restartBtn" title="重开">↻</button>
      </div>
    </main>

    <script defer src="./src/main.js"></script>
  </body>
</html>
